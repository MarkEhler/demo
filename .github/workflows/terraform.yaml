name: Terraform Plan and Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        description: Target environment
        options:
          - dev
          - qa
          - prod
          - test
          - test2
      plan_only:
        type: boolean
        description: Run with terraform plan only
        required: true
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      environment: ${{ steps.set-env.outputs.TARGET_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Debug Event
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Github Ref: $GITHUB_REF_NAME"
      - name: Determine Environment
        id: set-env
        env:
          EVENT_NAME: ${{ github.event_name}}
        run: |
          if [[ "$EVENT_NAME" = "pull_request" || ("$EVENT_NAME" = "push" && "$GITHUB_REF_NAME" = "main") ]]; then
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
            echo "TARGET_ENV=dev" >> $GITHUB_OUTPUT
          else
            echo "TARGET_ENV=${{ inputs.environment }}" >> $GITHUB_ENV
            echo "TARGET_ENV=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi
          cat $GITHUB_ENV

      - name: Setup Terraform and Azure
        uses: ./.github/actions/terraform-azure-setup
        with:
          environment: $TARGET_ENV
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          deployer_app_id: ${{ secrets.DEPLOYER_APP_ID }}
          deployer_app_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Terraform Plan
        run: |
          terraform plan -input=false -var-file="./environments/$TARGET_ENV.tfvars" -out=tfplan
          terraform show -no-color tfplan > tfplan.txt
          sed -E 's/^(\s*)\+/\1🟢 **Add**/; s/^(\s*)\~/\1🟡 **Change**/; s/^(\s*)\-/\1🔴 **Remove**/' tfplan.txt > plan.md
      
      - name: Comment Plan on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          path: plan.md

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.set-env.outputs.TARGET_ENV }}
          path: tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && inputs.plan_only == false }}
    environment:
      name: ${{ needs.terraform-plan.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform and Azure
        uses: ./.github/actions/terraform-azure-setup
        with:
          environment: ${{ needs.terraform-plan.outputs.environment }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.terraform-plan.outputs.environment }}
          path: .

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
