name: Deploy Datadog to VM

on:
  workflow_dispatch:
    inputs:
      vm_id:
        description: 'Azure VM ID (optional; uses Terraform output if empty)'
        required: true

jobs:
  datadog-vm-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Application token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.DEPLOYER_APP_ID }}
          application_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Datadog Agent to VM
        run: |
          if [ -z "${{ github.event.inputs.vm_id }}" ]; then
            VM_ID="$TF_VM_ID"
          else
            VM_ID="${{ github.event.inputs.vm_id }}"
          fi
          echo "[DATADOG_DEPLOYMENT_START] Target: VM, ID: $VM_ID, Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # az vm run-command invoke --ids "$VM_ID" --command-id RunShellScript --scripts "curl -L https://s3.amazonaws.com/dd-agent/scripts/install_script.sh -o /tmp/datadog-install.sh && chmod +x /tmp/datadog-install.sh && sudo DD_API_KEY='${DATADOG_API_KEY}' DD_AGENT_MAJOR_VERSION=7 bash /tmp/datadog-install.sh"
          # bash -c "$(curl -L https://install.datadoghq.com/scripts/install_script_agent7.sh)"
          echo "[DATADOG_DEPLOYMENT_COMPLETE] Agent installed on VM: $VM_ID"
        env:
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_SITE:    ${{ secrets.DATADOG_SITE }}