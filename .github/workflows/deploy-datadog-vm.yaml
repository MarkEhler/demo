name: Deploy Datadog to VM

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  datadog-vm-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Application token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.DEPLOYER_APP_ID }}
          application_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Debug OIDC subject
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, iss, aud}'

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Datadog Agent to VM
        run: |
          VM_ID=$(az vm show --resource-group "MarkEhler-demo-rg" --name "MarkEhler-demo-vm" --query id -o tsv)
          echo "VM_ID=$VM_ID" >> $GITHUB_ENV
          echo "[DATADOG_DEPLOYMENT_START] Target: VM, ID: $VM_ID, Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          az vm run-command invoke \
            --ids "$VM_ID" \
            --command-id RunShellScript \
            --scripts "DD_API_KEY='${DD_API_KEY}' DD_SITE='${DD_SITE}' DD_AGENT_MAJOR_VERSION=7 bash -c \"\$(curl -L https://install.datadoghq.com/scripts/install_script_agent7.sh)\""
          echo "[DATADOG_DEPLOYMENT_COMPLETE] Agent installed on VM: $VM_ID"
        env:
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_SITE: ${{ secrets.DATADOG_SITE }}