name: Deploy Hello World Pod to AKS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  hello-world-k8s:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Application token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.DEPLOYER_APP_ID }}
          application_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure kubectl is available
        run: |
          command -v kubectl || az aks install-cli

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "MarkEhler-demo-rg" \
            --name "MarkEhler-demo-aks" \
            --overwrite-existing

      - name: Deploy hello world pod
        run: |
          kubectl apply -f .github/workflows/agent_deployment/hello-world-pod.yaml
          kubectl wait --for=condition=Ready pod/hello-world --timeout=120s
          kubectl get pod hello-world -o wide
