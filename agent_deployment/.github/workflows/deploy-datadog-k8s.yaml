name: Deploy Datadog to Kubernetes

on:
  workflow_dispatch:
    inputs:
      aks_cluster:
        description: 'AKS Cluster Name'
        required: true

jobs:
  datadog-k8s-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Datadog Helm Chart
        run: |
          echo "[DATADOG_DEPLOYMENT_START] Target: K8S, Cluster: ${{ github.event.inputs.aks_cluster }}, Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          helm repo add datadog https://helm.datadoghq.com
          helm install datadog datadog/datadog -f values.yaml
          echo "[DATADOG_DEPLOYMENT_COMPLETE] Datadog deployed to cluster: ${{ github.event.inputs.aks_cluster }}"
        env:
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}

          