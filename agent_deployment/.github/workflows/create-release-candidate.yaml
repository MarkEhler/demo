name: Create Release Candidate

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "What would you like to name the release branch?"
        required: true
        type: string
      branch_from:
        description: "Which branch would you like this branch to be based on? (defaults to develop branch)"
        required: false
        type: string
      make_current_qa_branch:
        default: true
        description: "Would you like to make this branch the current QA branch?"
        required: true
        type: boolean

jobs:
  validate-and-create:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name format
        run: |
          if [[ ! "${{ github.event.inputs.branch_name }}" =~ ^release/v[0-9]+\.[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "Branch name must match one of the following formats: release/vX.Y, release/vX.Y.Z, or release/vX.Y.Z.W (e.g., release/v1.2, release/v1.2.3, or release/v1.2.3.4)"
            exit 1
          fi
          echo "Branch name format is valid."

      - name: Generate GitHub Application token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.DEPLOYER_APP_ID }}
          application_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Create branches in multiple repos
        run: |
          REPOS=("COMS" "DICE" "Tileserver" "deployment_superrepo")
          TOKEN="${{ steps.app-token.outputs.token }}"
          BRANCH="${{ github.event.inputs.branch_name }}"
          BASE="${{ github.event.inputs.branch_from }}"

          for repo in "${REPOS[@]}"; do
            echo "Creating branch $BRANCH in $repo"
            git clone https://x-access-token:$TOKEN@github.com/DisasterTechInc/$repo.git
            cd $repo

            if git ls-remote --heads origin $BRANCH | grep -q .; then
              echo "$BRANCH already exists in $repo"
              continue
            fi
            if [ -n "$BASE" ]; then
              echo "Using base branch $BASE"
              git checkout "$BASE"
            else
              echo "Using develop branch"
              git checkout "develop"
            fi

            git checkout -b "$BRANCH"
            git push origin "$BRANCH"

            cd ..
            rm -rf $repo
          done

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update current QA branch file
        if: ${{ inputs.make_current_qa_branch }}
        run: |
          echo "${{ inputs.branch_name }}" > current-qa-branch.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-qa-${{ github.run_id }}
          git add current-qa-branch.txt
          git commit -m "Update QA branch file to ${{ inputs.branch_name }}"
          git push origin HEAD

      - name: Create Pull Request
        if: ${{ inputs.make_current_qa_branch }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update-qa-${{ github.run_id }}
          title: "Update QA branch file to ${{ inputs.branch_name }}"
          body: "This PR updates the current QA branch file to `${{ inputs.branch_name }}`"
          base: main
          token: ${{ secrets.GITHUB_TOKEN }}