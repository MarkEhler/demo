name: Deployment Reusable Workflow

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      overlay_path:
        required: true
        type: string
      branch:
        required: false
        type: string
    secrets:
      DEPLOYER_APP_ID:
        required: true
      DEPLOYER_APP_PRIVATE_KEY:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      SOURCE_REPO: DisasterTechInc/${{ inputs.component }}
    steps:
      - name: Normalize component to lowercase
        id: normalize
        run: |
          echo "COMPONENT_LOWERCASE=$(echo '${{ inputs.component }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate GitHub Application token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.DEPLOYER_APP_ID }}
          application_private_key: ${{ secrets.DEPLOYER_APP_PRIVATE_KEY }}

      - name: Resolve image tag from branch
        if: ${{ inputs.branch && inputs.branch != '' }}
        id: resolve-sha
        run: |
          BRANCH_SHA=$(gh api repos/${{ env.SOURCE_REPO }}/git/refs/heads/${{ inputs.branch }} --jq '.object.sha')
          echo "Resolved SHA for branch '${{ inputs.branch }}': $BRANCH_SHA"
          echo "IMAGE_TAG=$BRANCH_SHA" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: DisasterTechInc/${{ inputs.component }}
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.branch }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: dtiacr.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Image
        run: |
          docker build . -t dtiacr.azurecr.io/${{ env.COMPONENT_LOWERCASE }}:${{ env.IMAGE_TAG }}
          docker push dtiacr.azurecr.io/${{ env.COMPONENT_LOWERCASE }} --all-tags
          IMAGE_SHA=$(docker inspect --format='{{index .RepoDigests 0}}' dtiacr.azurecr.io/${{ env.COMPONENT_LOWERCASE }}:${{ env.IMAGE_TAG }})
          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV

      - name: Checkout target deployment repo
        uses: actions/checkout@v4
        with:
          repository: DisasterTechInc/pratus-deployment
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update kustomization.yaml
        run: |
          cd ${{ inputs.overlay_path }}
          kustomize edit set image dtiacr.azurecr.io/${{ env.COMPONENT_LOWERCASE }}=dtiacr.azurecr.io/${{ env.COMPONENT_LOWERCASE }}:${{ env.IMAGE_TAG }}

      - name: Commit and push changes
        run: |
          git config user.name "deployer[bot]"
          git config user.email "deployer[bot]@disastertech.com"
          git add ${{ inputs.overlay_path }}/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${{ inputs.component }} image to $IMAGE_SHA"
            git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/DisasterTechInc/pratus-deployment.git main
          fi