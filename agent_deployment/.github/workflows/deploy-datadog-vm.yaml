name: Deploy Datadog to VM

on:
  workflow_dispatch:
    inputs:
      vm_id:
        description: 'Azure VM ID'
        required: true

jobs:
  datadog-vm-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Datadog Agent to VM
        run: |
          echo "[DATADOG_DEPLOYMENT_START] Target: VM, ID: ${{ github.event.inputs.vm_id }}, Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Your Datadog agent installation script here
          echo "[DATADOG_DEPLOYMENT_COMPLETE] Agent installed on VM: ${{ github.event.inputs.vm_id }}"
        env:
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          