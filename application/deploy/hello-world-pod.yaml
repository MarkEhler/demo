apiVersion: v1
kind: Pod
metadata:
  name: hello-world
  labels:
    app: hello-world
  annotations:
    ad.datadoghq.com/hello-world.logs: '[{"source":"k8s-busybox","service":"hello-world"}]'
spec:
  restartPolicy: OnFailure
  containers:
    - name: hello-world
      image: busybox
      command:
        - sh
        - -c
        - |
          i=0
          while true; do
            i=$((i + 1))
            echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"info\",\"message\":\"Hello World from AKS\",\"iteration\":$i,\"host\":\"$(hostname)\"}"
            sleep 100
          done