kind: DatadogAgent
apiVersion: datadoghq.com/v2alpha1

metadata:
name: datadog
namespace: datadog

spec:
global:
  clusterName: "MarkEhler-demo-aks"

  tags:
    - "environment:demo"
    - "project:markehler-datadog"
    - owner:mark

agent:
  version: "7.66.0"

site: us5.datadoghq.com

credentials:
  apiSecret:
    secretName: datadog-secret
    keyName: api-key
apm:
  enabled: true

features:
clusterChecks:
enabled: true
