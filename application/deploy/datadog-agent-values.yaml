apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    clusterName: "MarkEhler-demo-aks"
    site: us5.datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
    tags:
      - "environment:demo"
      - "project:markehler-datadog"
      - "owner:mark"
  features:
    apm:
      enabled: true
    clusterChecks:
      enabled: true
  override:
    nodeAgent:
      image:
        tag: "7.66.0"          # pin version